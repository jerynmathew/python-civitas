<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Producer agent -->
  <rect x="20" y="72" width="120" height="56" rx="6" fill="#2d6a4f"/>
  <text x="80" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="white">Producer agent</text>
  <text x="80" y="109" text-anchor="middle" font-size="9" fill="#a7f3d0">send() blocks here</text>

  <!-- Mailbox -->
  <rect x="180" y="60" width="120" height="80" rx="6" fill="#6b4c11"/>
  <text x="240" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="white">Mailbox</text>
  <text x="240" y="97" text-anchor="middle" font-size="10" fill="#fde68a" font-family="monospace">[████████████]</text>
  <text x="240" y="114" text-anchor="middle" font-size="9" fill="#fde68a">1000/1000 full</text>
  <text x="240" y="128" text-anchor="middle" font-size="8" fill="#fbbf24">bounded queue</text>

  <!-- Consumer agent -->
  <rect x="340" y="72" width="120" height="56" rx="6" fill="#2d6a4f"/>
  <text x="400" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="white">Consumer agent</text>
  <text x="400" y="109" text-anchor="middle" font-size="9" fill="#a7f3d0">processing slowly</text>

  <!-- Arrow 1: Producer → Mailbox (blocked) -->
  <line x1="140" y1="90" x2="178" y2="90" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="82" text-anchor="middle" font-size="8" fill="#374151">await mailbox.put()</text>
  <text x="160" y="104" text-anchor="middle" font-size="9" fill="#DC2626">⏸ blocked</text>

  <!-- Arrow 2: Mailbox → Consumer -->
  <line x1="300" y1="90" x2="338" y2="90" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="320" y="82" text-anchor="middle" font-size="8" fill="#374151">mailbox.get()</text>

  <!-- Arrow 3: Consumer → Mailbox (space freed, curved below) -->
  <path d="M 400 130 Q 400 170 240 170 Q 180 170 180 140" stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="310" y="178" text-anchor="middle" font-size="8" fill="#374151">space freed after processing</text>

  <!-- Arrow 4: Mailbox → Producer (unblocks, curved above) -->
  <path d="M 180 60 Q 180 30 130 30 Q 80 30 80 70" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="130" y="22" text-anchor="middle" font-size="8" fill="#374151">unblocks producer</text>
</svg>
