<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Root Supervisor -->
  <rect x="80" y="20" width="170" height="54" rx="8" fill="#1e3a5f"/>
  <text x="165" y="42" text-anchor="middle" font-size="12" fill="white" font-weight="600">root supervisor</text>
  <text x="165" y="57" text-anchor="middle" font-size="10" fill="white">ONE_FOR_ONE · max_restarts=2</text>

  <!-- Arrow: root → child supervisor (monitors) -->
  <line x1="165" y1="74" x2="165" y2="125" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="104" font-size="9" fill="#6B7280">monitors</text>

  <!-- Child Supervisor -->
  <rect x="80" y="126" width="170" height="54" rx="8" fill="#6b4c11"/>
  <text x="165" y="148" text-anchor="middle" font-size="12" fill="white" font-weight="600">research_sup</text>
  <text x="165" y="163" text-anchor="middle" font-size="10" fill="white">ONE_FOR_ONE · max_restarts=3</text>

  <!-- Arrow: child supervisor → agent (monitors) -->
  <line x1="165" y1="180" x2="165" y2="226" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="207" font-size="9" fill="#6B7280">monitors</text>

  <!-- Agent (crashed) -->
  <rect x="80" y="227" width="170" height="48" rx="8" fill="#7f1d1d"/>
  <text x="165" y="248" text-anchor="middle" font-size="12" fill="white" font-weight="600">web_researcher</text>
  <text x="165" y="264" text-anchor="middle" font-size="10" fill="white">crash #4 → max_restarts exceeded</text>

  <!-- Escalation arrow: agent → child (right side up) -->
  <path d="M 255 251 Q 295 210 255 155" stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="297" y="198" font-size="9" fill="#6B7280">crash #4</text>
  <text x="297" y="210" font-size="9" fill="#6B7280">→ escalate</text>

  <!-- Escalation arrow: child → root (right side up) -->
  <path d="M 255 153 Q 310 105 255 75" stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="312" y="95" font-size="9" fill="#6B7280">restart child</text>
  <text x="312" y="107" font-size="9" fill="#6B7280">supervisor</text>

  <!-- Notes panel -->
  <rect x="352" y="20" width="118" height="200" rx="8" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="411" y="38" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">How it works</text>
  <text x="360" y="58" font-size="9" fill="#374151">1. Agent crashes</text>
  <text x="360" y="73" font-size="9" fill="#374151">   repeatedly</text>
  <text x="360" y="93" font-size="9" fill="#374151">2. Child sup counts</text>
  <text x="360" y="108" font-size="9" fill="#374151">   restarts in window</text>
  <text x="360" y="128" font-size="9" fill="#374151">3. max_restarts=3</text>
  <text x="360" y="143" font-size="9" fill="#374151">   exceeded on crash 4</text>
  <text x="360" y="163" font-size="9" fill="#374151">4. Child sup treats</text>
  <text x="360" y="178" font-size="9" fill="#374151">   itself as crashed</text>
  <text x="360" y="198" font-size="9" fill="#374151">5. Root restarts</text>
  <text x="360" y="213" font-size="9" fill="#374151">   child sup + children</text>
</svg>
