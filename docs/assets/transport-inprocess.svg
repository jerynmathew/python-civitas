<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="420" height="200">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Title -->
  <text x="210" y="16" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">InProcessTransport — Single Python Process</text>

  <!-- Outer process boundary -->
  <rect x="12" y="24" width="396" height="168" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>

  <!-- MessageBus (center) -->
  <rect x="155" y="80" width="110" height="50" rx="8" fill="#6b4c11"/>
  <text x="210" y="101" text-anchor="middle" font-size="12" fill="white" font-weight="600">MessageBus</text>
  <text x="210" y="117" text-anchor="middle" font-size="9" fill="white">asyncio Queue</text>

  <!-- Agent A (left) -->
  <rect x="24" y="80" width="95" height="50" rx="8" fill="#2d6a4f"/>
  <text x="71" y="101" text-anchor="middle" font-size="12" fill="white" font-weight="600">Agent A</text>
  <text x="71" y="117" text-anchor="middle" font-size="9" fill="white">AgentProcess</text>

  <!-- Agent B (top right) -->
  <rect x="300" y="42" width="95" height="50" rx="8" fill="#2d6a4f"/>
  <text x="347" y="63" text-anchor="middle" font-size="12" fill="white" font-weight="600">Agent B</text>
  <text x="347" y="79" text-anchor="middle" font-size="9" fill="white">AgentProcess</text>

  <!-- Agent C (bottom right) -->
  <rect x="300" y="118" width="95" height="50" rx="8" fill="#2d6a4f"/>
  <text x="347" y="139" text-anchor="middle" font-size="12" fill="white" font-weight="600">Agent C</text>
  <text x="347" y="155" text-anchor="middle" font-size="9" fill="white">AgentProcess</text>

  <!-- Arrow: Agent A ↔ Bus -->
  <line x1="119" y1="105" x2="155" y2="105" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>

  <!-- Arrow: Bus ↔ Agent B -->
  <line x1="265" y1="95" x2="300" y2="72" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>

  <!-- Arrow: Bus ↔ Agent C -->
  <line x1="265" y1="115" x2="300" y2="138" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>
</svg>
