<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 250" width="560" height="250">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Process A box -->
  <rect x="10" y="20" width="165" height="210" rx="8" fill="#F9FAFB" stroke="#1e3a5f" stroke-width="2"/>
  <text x="92" y="40" text-anchor="middle" font-size="11" fill="#1e3a5f" font-weight="700">Process A</text>
  <!-- Orchestrator -->
  <rect x="24" y="52" width="137" height="42" rx="8" fill="#2d6a4f"/>
  <text x="92" y="72" text-anchor="middle" font-size="11" fill="white" font-weight="600">Orchestrator</text>
  <text x="92" y="86" text-anchor="middle" font-size="9" fill="white">supervisor process</text>
  <!-- Summarizer -->
  <rect x="24" y="104" width="137" height="42" rx="8" fill="#2d6a4f"/>
  <text x="92" y="124" text-anchor="middle" font-size="11" fill="white" font-weight="600">Summarizer</text>
  <text x="92" y="138" text-anchor="middle" font-size="9" fill="white">same process</text>

  <!-- ZMQ Proxy (center) -->
  <rect x="200" y="60" width="155" height="120" rx="8" fill="#6b4c11"/>
  <text x="277" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="600">ZMQ Proxy</text>
  <text x="277" y="102" text-anchor="middle" font-size="10" fill="white">XSUB/XPUB Forwarder</text>
  <text x="277" y="118" text-anchor="middle" font-size="9" fill="#fcd34d">tcp://127.0.0.1:5559</text>
  <text x="277" y="132" text-anchor="middle" font-size="9" fill="#fcd34d">tcp://127.0.0.1:5560</text>

  <!-- Process B box -->
  <rect x="380" y="20" width="165" height="210" rx="8" fill="#F9FAFB" stroke="#2d6a4f" stroke-width="2"/>
  <text x="462" y="40" text-anchor="middle" font-size="11" fill="#2d6a4f" font-weight="700">Process B</text>
  <!-- WebResearcher -->
  <rect x="394" y="78" width="137" height="42" rx="8" fill="#2d6a4f"/>
  <text x="462" y="98" text-anchor="middle" font-size="11" fill="white" font-weight="600">WebResearcher</text>
  <text x="462" y="112" text-anchor="middle" font-size="9" fill="white">worker process</text>

  <!-- Arrow: Process A ↔ ZMQ Proxy -->
  <line x1="175" y1="120" x2="200" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>
  <text x="187" y="112" text-anchor="middle" font-size="8" fill="#6B7280">PUB</text>
  <text x="187" y="130" text-anchor="middle" font-size="8" fill="#6B7280">SUB</text>

  <!-- Arrow: ZMQ Proxy ↔ Process B -->
  <line x1="355" y1="120" x2="380" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>
  <text x="367" y="112" text-anchor="middle" font-size="8" fill="#6B7280">PUB</text>
  <text x="367" y="130" text-anchor="middle" font-size="8" fill="#6B7280">SUB</text>

  <!-- Label below -->
  <text x="280" y="242" text-anchor="middle" font-size="10" fill="#374151">Multi-process on a single machine via TCP sockets</text>
</svg>
