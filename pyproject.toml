[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agency"]

[project]
name = "python-agency"
version = "0.1.0"
description = "The production runtime for Python agents"
requires-python = ">=3.12"
dependencies = [
    "msgpack>=1.1",
    "pyyaml>=6.0",
    "typer>=0.12",
    "rich>=13",
]

[project.optional-dependencies]
otel      = [
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
]
anthropic = ["anthropic>=0.20"]
litellm   = ["litellm>=1.40"]
zmq       = ["pyzmq>=25"]
nats      = ["nats-py>=2.6"]
fiddler   = ["fiddler-client>=3.0"]
dev       = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "pytest-cov>=5",
    "ruff>=0.4",
    "mypy>=1.10",
    "pre-commit>=3.7",
    "anthropic>=0.20",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
]
docs      = [
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.25",
    "mkdocs-gen-files>=0.5",
]

[project.scripts]
agency = "agency.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=agency --cov-report=term-missing --cov-fail-under=85"

[tool.coverage.run]
branch = true
omit = [
    "agency/adapters/*",
    "agency/cli/*",
    "agency/dashboard/*",
    "agency/__main__.py",
    "agency/plugins/anthropic.py",
    "agency/plugins/litellm.py",
    "agency/transport/__init__.py",
    "agency/transport/zmq.py",
    "agency/transport/nats.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@overload",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "ASYNC",
]
ignore = [
    "E501",
]

[tool.ruff.lint.isort]
known-first-party = ["agency"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = false
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["msgpack.*", "zmq.*", "nats.*", "litellm.*"]
ignore_missing_imports = true
