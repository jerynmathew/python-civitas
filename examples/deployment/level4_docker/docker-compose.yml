# Generated by: agency deploy docker-compose --topology topology.yaml
# Edit ANTHROPIC_API_KEY in .env before running.
#
# Run:   docker compose up --build
# Scale: docker compose up --scale worker-worker=3

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  supervisor:
    build: ../../../   # repo root — Dockerfile copies agency/ and examples/
    command: ["--topology", "examples/deployment/level4_docker/topology.yaml"]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      AGENCY_SERIALIZER: ${AGENCY_SERIALIZER:-msgpack}
      NATS_URL: nats://nats:4222
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - agency_data:/data

  worker-worker:
    build: ../../../
    command:
      - "--topology"
      - "examples/deployment/level4_docker/topology.yaml"
      - "--process"
      - "worker"
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      supervisor:
        condition: service_started
    environment:
      AGENCY_SERIALIZER: ${AGENCY_SERIALIZER:-msgpack}
      NATS_URL: nats://nats:4222
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    labels:
      agency.process: worker
      agency.agents: worker_a,worker_b

volumes:
  agency_data:

networks:
  default:
    name: agency-network
