# Deployment Level 3: Distributed (NATSTransport)
#
# Identical agent topology to Level 2. Only the transport block changes.
# Agents can now run on separate machines — NATS routes all messages.
#
# Install: pip install civitas[nats]
#
# Run:
#   Start NATS:
#     docker run -d -p 4222:4222 -p 8222:8222 nats
#
#   Machine A (supervisor):
#     civitas run --topology examples/deployment/level3_distributed/topology.yaml
#
#   Machine B (worker — point at the NATS host):
#     NATS_URL=nats://machine-a:4222 \
#     civitas run --topology examples/deployment/level3_distributed/topology.yaml \
#                --process worker
#
# Or programmatically — see run_supervisor.py and run_worker.py

transport:
  type: nats
  servers: "nats://localhost:4222"
  jetstream: false          # set true for at-least-once delivery

plugins:
  state:
    type: sqlite
    config:
      db_path: /tmp/agency_level3.db   # use a persistent volume in production

supervision:
  name: root
  strategy: ONE_FOR_ONE
  max_restarts: 5
  backoff: EXPONENTIAL
  backoff_base: 1.0
  backoff_max: 30.0
  children:
    - agent:
        name: frontend
        type: examples.deployment.level3_distributed.agents.FrontendAgent

    - agent:
        name: worker_a
        type: examples.deployment.level3_distributed.agents.WorkerAgent
        process: worker

    - agent:
        name: worker_b
        type: examples.deployment.level3_distributed.agents.WorkerAgent
        process: worker
