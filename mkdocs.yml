site_name: python-agency
site_description: The production runtime for Python agents
site_url: https://github.com/anthropics/python-agency
repo_url: https://github.com/anthropics/python-agency
repo_name: anthropics/python-agency

theme:
  name: material
  palette:
    primary: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference:
      - Runtime: api/runtime.md
      - AgentProcess: api/process.md
      - Supervisor: api/supervisor.md
      - Messages: api/messages.md
      - Observability: api/observability.md
