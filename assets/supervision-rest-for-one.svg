<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">REST_FOR_ONE — crashed + younger siblings restart</text>

  <!-- Supervisor box -->
  <rect x="130" y="30" width="140" height="48" rx="8" fill="#1e3a5f"/>
  <text x="200" y="51" text-anchor="middle" font-size="12" fill="white" font-weight="600">Supervisor</text>
  <text x="200" y="67" text-anchor="middle" font-size="10" fill="white">REST_FOR_ONE</text>

  <!-- Connector lines from supervisor -->
  <line x1="200" y1="78" x2="80" y2="100" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="200" y1="78" x2="200" y2="100" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="200" y1="78" x2="320" y2="100" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="100" x2="200" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="100" x2="320" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage-1 box (unaffected) -->
  <rect x="20" y="130" width="120" height="66" rx="8" fill="#2d6a4f"/>
  <text x="80" y="152" text-anchor="middle" font-size="12" fill="white" font-weight="600">stage-1</text>
  <text x="80" y="168" text-anchor="middle" font-size="10" fill="white">✓ unaffected</text>
  <text x="80" y="182" text-anchor="middle" font-size="9" fill="white">(started first)</text>

  <!-- Stage-2 box (crashed) -->
  <rect x="140" y="130" width="120" height="66" rx="8" fill="#7f1d1d"/>
  <text x="200" y="152" text-anchor="middle" font-size="12" fill="white" font-weight="600">stage-2</text>
  <text x="200" y="166" text-anchor="middle" font-size="10" fill="white">✗ crashed → ↻</text>
  <text x="200" y="180" text-anchor="middle" font-size="9" fill="white">(restarting)</text>

  <!-- Stage-3 box (restarting younger sibling) -->
  <rect x="260" y="130" width="120" height="66" rx="8" fill="#6b4c11"/>
  <text x="320" y="149" text-anchor="middle" font-size="12" fill="white" font-weight="600">stage-3</text>
  <text x="320" y="163" text-anchor="middle" font-size="10" fill="white">↻ restarting</text>
  <text x="320" y="177" text-anchor="middle" font-size="9" fill="white">(younger sibling)</text>
</svg>
