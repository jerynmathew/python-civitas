<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" width="700" height="540"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Column 1: main crash flow (x=230 center) -->
  <!-- Column 2: escalation path (x=580 center) -->

  <!-- A -->
  <rect x="80" y="20" width="300" height="36" rx="6" fill="#7f1d1d" stroke="#7f1d1d"/>
  <text x="230" y="39" text-anchor="middle" font-size="10.5" font-weight="600" fill="white">agent._task raises Exception</text>

  <line x1="230" y1="56" x2="230" y2="76" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- B -->
  <rect x="80" y="76" width="300" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="230" y="91" text-anchor="middle" font-size="9.5" fill="#374151">task.done_callback fires</text>
  <text x="230" y="103" text-anchor="middle" font-size="9.5" fill="#374151">_on_child_done(name, task)</text>

  <line x1="230" y1="112" x2="230" y2="132" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- C -->
  <rect x="80" y="132" width="300" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="230" y="147" text-anchor="middle" font-size="9.5" fill="#374151">asyncio.create_task(</text>
  <text x="230" y="159" text-anchor="middle" font-size="9.5" fill="#374151">_handle_crash(name, exc))</text>

  <line x1="230" y1="168" x2="230" y2="188" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- D -->
  <rect x="80" y="188" width="300" height="36" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="230" y="203" text-anchor="middle" font-size="9.5" fill="#374151">Update sliding window</text>
  <text x="230" y="215" text-anchor="middle" font-size="9.5" fill="#374151">(deque-based, O(1))</text>

  <line x1="230" y1="224" x2="230" y2="248" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- E diamond: max_restarts? -->
  <polygon points="230,248 320,270 230,292 140,270" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="230" y="267" text-anchor="middle" font-size="9.5" font-weight="600" fill="#78350F">max_restarts</text>
  <text x="230" y="280" text-anchor="middle" font-size="9.5" font-weight="600" fill="#78350F">exceeded?</text>

  <!-- YES → escalation path (right) -->
  <line x1="320" y1="270" x2="440" y2="270" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="382" y="263" font-size="9" fill="#EF4444" text-anchor="middle" font-weight="600">Yes</text>

  <!-- NO → normal restart path (down) -->
  <line x1="230" y1="292" x2="230" y2="318" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="240" y="308" font-size="9" fill="#22C55E" font-weight="600">No</text>

  <!-- G: emit restart span -->
  <rect x="80" y="318" width="300" height="30" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="230" y="337" text-anchor="middle" font-size="9.5" fill="#374151">emit supervisor.restart span (OTEL)</text>

  <line x1="230" y1="348" x2="230" y2="368" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- H: backoff -->
  <rect x="80" y="368" width="300" height="30" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="230" y="387" text-anchor="middle" font-size="9.5" fill="#374151">_compute_backoff() → asyncio.sleep(delay)</text>

  <line x1="230" y1="398" x2="230" y2="418" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- I diamond: strategy? -->
  <polygon points="230,418 310,438 230,458 150,438" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="230" y="435" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1D4ED8">strategy?</text>

  <!-- Three branches from strategy -->
  <line x1="150" y1="438" x2="80" y2="478" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="460" font-size="8.5" fill="#6B7280">1-for-1</text>

  <line x1="230" y1="458" x2="230" y2="478" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="240" y="473" font-size="8.5" fill="#6B7280">1-for-all</text>

  <line x1="310" y1="438" x2="380" y2="478" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="358" y="460" font-size="8.5" fill="#6B7280">rest-for-1</text>

  <rect x="20" y="478" width="130" height="30" rx="5" fill="#2d6a4f" stroke="#2d6a4f"/>
  <text x="85" y="493" text-anchor="middle" font-size="9" fill="white">restart child</text>
  <text x="85" y="505" text-anchor="middle" font-size="9" fill="white">ONE_FOR_ONE</text>

  <rect x="162" y="478" width="136" height="30" rx="5" fill="#2d6a4f" stroke="#2d6a4f"/>
  <text x="230" y="493" text-anchor="middle" font-size="9" fill="white">restart all</text>
  <text x="230" y="505" text-anchor="middle" font-size="9" fill="white">ONE_FOR_ALL</text>

  <rect x="310" y="478" width="130" height="30" rx="5" fill="#2d6a4f" stroke="#2d6a4f"/>
  <text x="375" y="493" text-anchor="middle" font-size="9" fill="white">restart rest</text>
  <text x="375" y="505" text-anchor="middle" font-size="9" fill="white">REST_FOR_ONE</text>

  <!-- Escalation path (right column) -->
  <!-- F: escalate -->
  <rect x="440" y="248" width="240" height="36" rx="6" fill="#7f1d1d" stroke="#7f1d1d"/>
  <text x="560" y="267" text-anchor="middle" font-size="10" font-weight="600" fill="white">_escalate(name, exc)</text>

  <line x1="560" y1="284" x2="560" y2="310" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- M diamond: parent? -->
  <polygon points="560,310 635,330 560,350 485,330" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="560" y="327" text-anchor="middle" font-size="9.5" font-weight="600" fill="#78350F">parent supervisor?</text>

  <!-- Yes → escalate up -->
  <line x1="560" y1="350" x2="560" y2="378" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="570" y="368" font-size="9" fill="#EF4444" font-weight="600">Yes</text>

  <rect x="450" y="378" width="220" height="42" rx="6" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="560" y="394" text-anchor="middle" font-size="9" fill="#374151">parent._handle_crash(</text>
  <text x="560" y="407" text-anchor="middle" font-size="9" fill="#374151">self.name, exc) — escalate up tree</text>

  <!-- No → permanent failure -->
  <line x1="635" y1="330" x2="680" y2="330" stroke="#EF4444" stroke-width="1.5"/>
  <text x="660" y="323" font-size="9" fill="#EF4444" font-weight="600">No</text>
  <line x1="680" y1="330" x2="680" y2="440" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="680" y1="440" x2="658" y2="440" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <rect x="450" y="422" width="210" height="36" rx="6" fill="#7f1d1d" stroke="#7f1d1d"/>
  <text x="558" y="437" text-anchor="middle" font-size="9.5" font-weight="600" fill="white">Log permanent failure</text>
  <text x="558" y="450" text-anchor="middle" font-size="9.5" fill="white">agent stays CRASHED</text>

</svg>
