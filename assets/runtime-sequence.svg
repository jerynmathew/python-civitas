<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-ret" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- 6 participants: Caller | Runtime | MessageBus | Transport | Supervisor | Agent -->
  <rect x="10"  y="8" width="80" height="28" rx="5" fill="#374151"/>
  <text x="50"  y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">Caller</text>

  <rect x="120" y="8" width="80" height="28" rx="5" fill="#1e3a5f"/>
  <text x="160" y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">Runtime</text>

  <rect x="230" y="8" width="90" height="28" rx="5" fill="#6b4c11"/>
  <text x="275" y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">MessageBus</text>

  <rect x="350" y="8" width="80" height="28" rx="5" fill="#6b4c11"/>
  <text x="390" y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">Transport</text>

  <rect x="460" y="8" width="90" height="28" rx="5" fill="#1e3a5f"/>
  <text x="505" y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">Supervisor</text>

  <rect x="580" y="8" width="80" height="28" rx="5" fill="#2d6a4f"/>
  <text x="620" y="27" text-anchor="middle" font-size="9" font-weight="700" fill="white">Agent</text>

  <!-- Lifelines -->
  <line x1="50"  y1="36" x2="50"  y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="36" x2="160" y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="275" y1="36" x2="275" y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="390" y1="36" x2="390" y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="505" y1="36" x2="505" y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="36" x2="620" y2="448" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- STARTUP phase label -->
  <text x="310" y="56" text-anchor="middle" font-size="8" font-weight="700" fill="#1D4ED8" letter-spacing="0.5">STARTUP</text>

  <line x1="160" y1="65" x2="499" y2="65" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="60" text-anchor="middle" font-size="8" fill="#374151">start() — build ComponentSet, start transport</text>

  <line x1="505" y1="80" x2="614" y2="80" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="560" y="74" text-anchor="middle" font-size="8" fill="#374151">start() → on_start()</text>

  <line x1="614" y1="95" x2="511" y2="95" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-ret)"/>
  <text x="560" y="90" text-anchor="middle" font-size="8" fill="#15803D">RUNNING</text>

  <!-- Separator -->
  <line x1="30" y1="112" x2="730" y2="112" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="310" y="124" text-anchor="middle" font-size="8" font-weight="700" fill="#15803D" letter-spacing="0.5">MESSAGE ROUTING</text>

  <line x1="50" y1="133" x2="154" y2="133" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="102" y="127" text-anchor="middle" font-size="8" fill="#374151">ask("my-agent", {...})</text>

  <line x1="160" y1="150" x2="269" y2="150" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="214" y="144" text-anchor="middle" font-size="8" fill="#374151">route(message)</text>

  <line x1="275" y1="165" x2="275" y2="165"/>
  <line x1="275" y1="165" x2="384" y2="165" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="328" y="159" text-anchor="middle" font-size="8" fill="#374151">publish(address, bytes)</text>
  <text x="328" y="170" text-anchor="middle" font-size="7.5" fill="#9CA3AF">lookup("my-agent") → address</text>

  <line x1="390" y1="183" x2="614" y2="183" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="502" y="177" text-anchor="middle" font-size="8" fill="#374151">mailbox.put(message)</text>

  <!-- handle + note -->
  <rect x="608" y="197" width="24" height="36" rx="2" fill="#BBF7D0" stroke="#86EFAC" stroke-width="1"/>
  <text x="645" y="210" font-size="8" fill="#374151">handle(message)</text>
  <text x="645" y="221" font-size="7.5" fill="#9CA3AF">self.llm.chat()</text>
  <text x="645" y="231" font-size="7.5" fill="#9CA3AF">self.tools.execute()</text>

  <!-- Reply path -->
  <line x1="614" y1="238" x2="396" y2="238" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-ret)"/>
  <text x="505" y="233" text-anchor="middle" font-size="8" fill="#6B7280">reply bytes</text>

  <line x1="384" y1="253" x2="166" y2="253" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-ret)"/>
  <text x="275" y="248" text-anchor="middle" font-size="8" fill="#6B7280">reply message</text>

  <line x1="154" y1="268" x2="56" y2="268" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-ret)"/>
  <text x="102" y="263" text-anchor="middle" font-size="8" fill="#6B7280">reply</text>

  <!-- Separator -->
  <line x1="30" y1="284" x2="730" y2="284" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="310" y="296" text-anchor="middle" font-size="8" font-weight="700" fill="#B91C1C" letter-spacing="0.5">CRASH RECOVERY</text>

  <!-- crash -->
  <path d="M620,305 Q640,305 640,312 Q640,319 620,319" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="670" y="315" font-size="8" fill="#B91C1C">crash!</text>

  <line x1="614" y1="333" x2="511" y2="333" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="562" y="327" text-anchor="middle" font-size="8" fill="#B91C1C">task.done_callback</text>

  <!-- detect + restart -->
  <path d="M505,348 Q485,348 485,357 Q485,366 505,366" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="420" y="360" font-size="8" fill="#374151">detect crash →</text>
  <text x="420" y="371" font-size="8" fill="#374151">compute backoff</text>

  <line x1="505" y1="385" x2="614" y2="385" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="560" y="379" text-anchor="middle" font-size="8" fill="#15803D">restart (after backoff)</text>

  <line x1="614" y1="400" x2="511" y2="400" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arr-ret)"/>
  <text x="560" y="395" text-anchor="middle" font-size="8" fill="#15803D">RUNNING again</text>

  <!-- note at bottom -->
  <rect x="10" y="420" width="730" height="22" rx="3" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="375" y="434" text-anchor="middle" font-size="8.5" fill="#15803D">The Caller never sees the crash — the Supervisor handles it transparently between messages.</text>

</svg>
