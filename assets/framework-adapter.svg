<svg viewBox="0 0 580 220" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="290" y="22" font-size="13" font-weight="bold" fill="#374151" text-anchor="middle">Framework Adapter Pattern</text>

  <!-- Left panel header -->
  <rect x="15" y="34" width="250" height="28" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="140" y="53" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">Without Civitas Adapter</text>

  <!-- Framework agent box (left) -->
  <rect x="50" y="80" width="180" height="52" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="140" y="101" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">Framework Agent</text>
  <text x="140" y="118" font-size="9" fill="#374151" text-anchor="middle">LangGraph / OpenAI SDK</text>

  <!-- No supervision note -->
  <text x="140" y="152" font-size="9" fill="#9CA3AF" text-anchor="middle" font-style="italic">No supervision</text>
  <text x="140" y="165" font-size="9" fill="#9CA3AF" text-anchor="middle" font-style="italic">No transport</text>
  <text x="140" y="178" font-size="9" fill="#9CA3AF" text-anchor="middle" font-style="italic">No tracing</text>

  <!-- Vertical divider -->
  <line x1="290" y1="28" x2="290" y2="210" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Right panel header -->
  <rect x="315" y="34" width="250" height="28" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="440" y="53" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">With Civitas Adapter</text>

  <!-- Supervisor (right) -->
  <rect x="355" y="78" width="170" height="44" rx="6" fill="#1e3a5f"/>
  <text x="440" y="97" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Supervisor</text>
  <text x="440" y="113" font-size="9" fill="white" text-anchor="middle">restarts on crash</text>

  <!-- Arrow: Supervisor → AgentProcess wrapper -->
  <line x1="440" y1="122" x2="440" y2="138" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="450" y="134" font-size="8" fill="#9CA3AF">restarts on crash</text>

  <!-- AgentProcess wrapper -->
  <rect x="355" y="140" width="170" height="44" rx="6" fill="#2d6a4f"/>
  <text x="440" y="159" font-size="11" font-weight="bold" fill="white" text-anchor="middle">AgentProcess</text>
  <text x="440" y="175" font-size="9" fill="white" text-anchor="middle">adapter wrapper</text>

  <!-- Arrow: wrapper → Framework agent -->
  <line x1="440" y1="184" x2="440" y2="196" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="450" y="193" font-size="8" fill="#9CA3AF">delegates to</text>

  <!-- Framework agent (right, unchanged) -->
  <rect x="355" y="198" width="170" height="0" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>
  <rect x="370" y="200" width="140" height="0" rx="6" fill="#F9FAFB" stroke="#D1D5DB"/>

  <!-- Inline framework label under arrow -->
  <rect x="355" y="200" width="170" height="8" rx="2" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="440" y="207" font-size="8" fill="#374151" text-anchor="middle">Framework agent (unchanged)</text>
</svg>
