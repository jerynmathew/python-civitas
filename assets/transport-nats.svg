<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 240" width="580" height="240">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Machine A box -->
  <rect x="10" y="60" width="155" height="120" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="87" y="80" text-anchor="middle" font-size="11" fill="#374151" font-weight="700">Machine A</text>
  <rect x="22" y="89" width="131" height="36" rx="8" fill="#2d6a4f"/>
  <text x="87" y="107" text-anchor="middle" font-size="11" fill="white" font-weight="600">Orchestrator</text>
  <rect x="22" y="133" width="131" height="36" rx="8" fill="#2d6a4f"/>
  <text x="87" y="151" text-anchor="middle" font-size="11" fill="white" font-weight="600">Summarizer</text>

  <!-- NATS Server (center) -->
  <rect x="200" y="72" width="175" height="96" rx="8" fill="#4a1942"/>
  <text x="287" y="97" text-anchor="middle" font-size="13" fill="white" font-weight="700">NATS Server</text>
  <text x="287" y="115" text-anchor="middle" font-size="10" fill="white">agency.agent.*</text>
  <text x="287" y="132" text-anchor="middle" font-size="9" fill="#d8b4fe">nats://host:4222</text>
  <text x="287" y="148" text-anchor="middle" font-size="9" fill="#d8b4fe">subjects per agent</text>

  <!-- Machine B box (top right) -->
  <rect x="410" y="20" width="155" height="90" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="487" y="40" text-anchor="middle" font-size="11" fill="#374151" font-weight="700">Machine B</text>
  <rect x="422" y="49" width="131" height="50" rx="8" fill="#2d6a4f"/>
  <text x="487" y="70" text-anchor="middle" font-size="11" fill="white" font-weight="600">WebResearcher</text>
  <text x="487" y="86" text-anchor="middle" font-size="9" fill="white">worker process</text>

  <!-- Machine C box (bottom right) -->
  <rect x="410" y="130" width="155" height="90" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="487" y="150" text-anchor="middle" font-size="11" fill="#374151" font-weight="700">Machine C</text>
  <rect x="422" y="159" width="131" height="50" rx="8" fill="#2d6a4f"/>
  <text x="487" y="180" text-anchor="middle" font-size="11" fill="white" font-weight="600">AnotherWorker</text>
  <text x="487" y="196" text-anchor="middle" font-size="9" fill="white">worker process</text>

  <!-- Arrow: Machine A ↔ NATS -->
  <line x1="165" y1="120" x2="200" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>

  <!-- Arrow: NATS ↔ Machine B -->
  <line x1="375" y1="100" x2="410" y2="74" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>

  <!-- Arrow: NATS ↔ Machine C -->
  <line x1="375" y1="140" x2="410" y2="175" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-start)"/>

  <!-- Label: Machine A ↔ NATS -->
  <text x="182" y="111" text-anchor="middle" font-size="8" fill="#6B7280">nats://</text>
  <text x="182" y="122" text-anchor="middle" font-size="8" fill="#6B7280">host:4222</text>

  <!-- Footer -->
  <text x="290" y="232" text-anchor="middle" font-size="10" fill="#374151">Distributed across multiple machines via NATS subjects</text>
</svg>
