<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="230" y="22" font-size="12" font-weight="bold" fill="#374151" text-anchor="middle">Agent Lifecycle State Machine</text>

  <!-- Start circle -->
  <circle cx="28" cy="110" r="9" fill="#1e3a5f"/>

  <!-- INITIALIZING -->
  <rect x="48" y="88" width="108" height="44" rx="18" fill="#6b4c11"/>
  <text x="102" y="107" font-size="11" font-weight="bold" fill="white" text-anchor="middle">INITIALIZING</text>
  <text x="102" y="122" font-size="9" fill="white" text-anchor="middle">start()</text>

  <!-- RUNNING -->
  <rect x="178" y="88" width="100" height="44" rx="18" fill="#2d6a4f"/>
  <text x="228" y="107" font-size="11" font-weight="bold" fill="white" text-anchor="middle">RUNNING</text>
  <text x="228" y="122" font-size="9" fill="white" text-anchor="middle">handle(msg)</text>

  <!-- STOPPING -->
  <rect x="300" y="88" width="100" height="44" rx="18" fill="#1e3a5f"/>
  <text x="350" y="107" font-size="11" font-weight="bold" fill="white" text-anchor="middle">STOPPING</text>
  <text x="350" y="122" font-size="9" fill="white" text-anchor="middle">_stop() called</text>

  <!-- STOPPED -->
  <rect x="300" y="190" width="100" height="44" rx="18" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="350" y="214" font-size="11" font-weight="bold" fill="#374151" text-anchor="middle">STOPPED</text>

  <!-- CRASHED -->
  <rect x="178" y="190" width="100" height="44" rx="18" fill="#7f1d1d"/>
  <text x="228" y="214" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CRASHED</text>

  <!-- End circle (double) -->
  <circle cx="350" cy="262" r="9" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="350" cy="262" r="5" fill="#374151"/>

  <!-- Arrows -->
  <!-- Start → INITIALIZING -->
  <line x1="37" y1="110" x2="46" y2="110" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="20" y="135" font-size="8" fill="#9CA3AF" text-anchor="middle">start()</text>

  <!-- INITIALIZING → RUNNING -->
  <line x1="156" y1="110" x2="176" y2="110" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="166" y="104" font-size="8" fill="#9CA3AF" text-anchor="middle">on_start()</text>
  <text x="166" y="114" font-size="8" fill="#9CA3AF" text-anchor="middle">completes</text>

  <!-- RUNNING → STOPPING -->
  <line x1="278" y1="110" x2="298" y2="110" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="288" y="104" font-size="8" fill="#9CA3AF" text-anchor="middle">shutdown</text>
  <text x="288" y="114" font-size="8" fill="#9CA3AF" text-anchor="middle">signal</text>

  <!-- STOPPING → STOPPED -->
  <line x1="350" y1="132" x2="350" y2="188" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="358" y="165" font-size="8" fill="#9CA3AF">on_stop()</text>

  <!-- RUNNING → CRASHED -->
  <path d="M 228 132 L 228 188" stroke="#9CA3AF" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="186" y="162" font-size="8" fill="#9CA3AF">unhandled</text>
  <text x="186" y="172" font-size="8" fill="#9CA3AF">exception</text>

  <!-- CRASHED → STOPPED -->
  <line x1="278" y1="212" x2="298" y2="212" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="288" y="206" font-size="8" fill="#9CA3AF" text-anchor="middle">on_stop()</text>
  <text x="288" y="216" font-size="8" fill="#9CA3AF" text-anchor="middle">completes</text>

  <!-- STOPPED → end -->
  <line x1="350" y1="234" x2="350" y2="251" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
