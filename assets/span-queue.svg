<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90" width="520" height="90"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="145" height="50" rx="7" fill="#2d6a4f" stroke="#2d6a4f"/>
  <text x="82" y="41" text-anchor="middle" font-size="10.5" font-weight="700" fill="white">agent.handle()</text>
  <text x="82" y="57" text-anchor="middle" font-size="8.5" fill="#86EFAC">emits OTEL spans</text>

  <line x1="155" y1="45" x2="195" y2="45" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
