  <rect x="195" y="20" width="155" height="50" rx="7" fill="#1e3a5f" stroke="#1e3a5f"/>
  <text x="272" y="41" text-anchor="middle" font-size="10.5" font-weight="700" fill="white">SpanQueue</text>
  <text x="272" y="57" text-anchor="middle" font-size="8.5" fill="#93C5FD">asyncio.Queue cap=10000</text>

  <line x1="350" y1="45" x2="390" y2="45" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="38" text-anchor="middle" font-size="8" fill="#6B7280">background</text>

  <rect x="390" y="20" width="120" height="50" rx="7" fill="#4a1942" stroke="#4a1942"/>
  <text x="450" y="41" text-anchor="middle" font-size="10.5" font-weight="700" fill="white">ExportBackend</text>
  <text x="450" y="57" text-anchor="middle" font-size="8.5" fill="#E9D5FF">ConsoleBackend · OTEL</text>

</svg>
