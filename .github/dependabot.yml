version: 2

updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      # Group non-security patch/minor bumps to reduce PR noise
      dev-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "pre-commit"
        update-types:
          - minor
          - patch
    ignore:
      # Pin major version bumps for review — let security patches through
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
