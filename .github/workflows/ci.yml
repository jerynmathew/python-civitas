name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run ruff check civitas tests
      - run: uv run ruff format --check civitas tests
      - run: uv run mypy civitas
      - run: uv run pytest --cov=civitas --cov-fail-under=85 -q
