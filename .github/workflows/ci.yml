name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run ruff check agency tests
      - run: uv run ruff format --check agency tests
      - run: uv run mypy agency
      - run: uv run pytest --cov=agency --cov-fail-under=85 -q
